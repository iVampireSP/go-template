name: Release

on:
  push:
    tags: ["*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leaflownet/leaflow

jobs:
  # test:
  #   uses: ./.github/workflows/go-test.yml

  build:
    name: Build and Push
    runs-on: leaflow-cloud
    # needs: test
    permissions:
      contents: write
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set variables
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "tag_name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.vars.outputs.tag_name }}
            COMMIT=${{ steps.vars.outputs.sha_short }}
            BUILD_TIME=${{ steps.vars.outputs.build_time }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Update fleet branch
        run: |
          git fetch origin fleet:fleet
          git checkout fleet
          sed -i "s/imageTag: .*/imageTag: \"${{ steps.vars.outputs.tag_name }}\"/" fleet.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fleet.yaml
          git diff --staged --quiet || git commit -m "deploy: ${{ steps.vars.outputs.tag_name }}"
          git push origin fleet
