# 密钥存储配置
# 使用 CLI 生成密钥: ./cloud keys generate

keys:
  # RSA 密钥 (用于 JWT 签名、数据加密等)
  rsa:
    type: rsa
    private_key: ${RSA_PRIVATE_KEY:-}
    public_key: ${RSA_PUBLIC_KEY:-}

  # ECDSA P-256 密钥 (用于 Web Push VAPID)
  ecdsa:
    type: ecdsa
    private_key: ${ECDSA_PRIVATE_KEY:-}
    public_key: ${ECDSA_PUBLIC_KEY:-}
